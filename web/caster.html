<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Caster Deck</title><link rel="stylesheet" href="/workspace/web/styles/tokens.css"></head><body>
<div class="grid">
  <div class="panel" style="grid-column:1/5">
    <strong>Highlights Timeline</strong>
    <div style="height:240px;margin-top:8px;background:#121620;border-radius:8px;position:relative">
      <div style="position:absolute;left:10%;top:20%;width:6px;height:80%;background:var(--accent)"></div>
      <div style="position:absolute;left:40%;top:30%;width:6px;height:70%;background:var(--danger)"></div>
      <div style="position:absolute;left:75%;top:25%;width:6px;height:75%;background:var(--shield)"></div>
    </div>
    <div style="margin-top:12px" class="hud-card">
      <div>Replay Scrubber</div>
      <input type="range" min="0" max="100" value="0" style="width:100%">
    </div>
  </div>
  <div class="panel" style="grid-column:5/9">
    <strong>Camera Modes</strong>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="iconbtn">Auto</button>
      <button class="iconbtn">TopDown</button>
      <button class="iconbtn">ImpactPredict</button>
      <button class="iconbtn">KiterOrbit</button>
    </div>
    <div class="hud-card" style="margin-top:12px;height:200px;display:grid;place-items:center">Preview Pane</div>
  </div>
  <div class="panel" style="grid-column:9/-1">
    <strong>Macros</strong>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px">
      <button class="button">Slo-mo</button>
      <button class="button">X-ray Aim</button>
      <button class="button">Heatmap</button>
      <button class="button">Stat Card</button>
    </div>
    <div class="hud-card" style="margin-top:12px">
      <strong>Lower Thirds</strong>
      <div style="display:flex;gap:8px;margin-top:8px">
        <input class="panel" placeholder="Title" style="flex:1;padding:8px">
        <input class="panel" placeholder="Subtitle" style="flex:1;padding:8px">
        <button class="button">Push Live</button>
      </div>
    </div>
  </div>
</div>
</body></html>
