<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Arena Viewer</title><link rel="stylesheet" href="/workspace/web/styles/tokens.css"></head><body>
<div class="grid">
  <div class="panel" style="grid-column:1/-1">
    <div style="display:flex;align-items:center;gap:12px;justify-content:space-between">
      <div style="display:flex;align-items:center;gap:12px"><span class="badge">LIVE</span><strong>Match m_123</strong></div>
      <div style="display:flex;gap:8px"><button class="iconbtn" id="camAuto">Auto</button><button class="iconbtn" id="camTop">Top</button><button class="iconbtn" id="camOrbit">Orbit</button></div>
    </div>
  </div>
  <div style="grid-column:1/-1" class="canvas" id="canvas">
    <div class="top-hud">
      <div class="hud-card" style="width:420px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><strong>Build A</strong><span>HP</span></div>
        <div class="bar"><span id="hpA" style="width:80%"></span></div>
        <div style="display:flex;gap:12px;margin-top:8px">
          <div class="dial"><div class="value" id="enA">78</div></div>
          <div class="dial"><div class="value" id="heatA">22</div></div>
          <div class="badge">Charge: <span id="chargeA">0.4</span></div>
        </div>
      </div>
      <div class="hud-card" style="width:420px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span>HP</span><strong>Build B</strong></div>
        <div class="bar"><span id="hpB" style="width:92%"></span></div>
        <div style="display:flex;gap:12px;margin-top:8px;justify-content:flex-end">
          <div class="badge">Charge: <span id="chargeB">0.2</span></div>
          <div class="dial"><div class="value" id="heatB">15</div></div>
          <div class="dial"><div class="value" id="enB">86</div></div>
        </div>
      </div>
    </div>
    <div class="bottom-bar">
      <div class="hud-card" style="display:flex;gap:12px;align-items:center">
        <strong>MiniMap</strong>
        <div style="width:256px;height:160px;background:#1a1f2a;border-radius:8px;border:1px solid rgba(255,255,255,0.06)"></div>
      </div>
      <div class="hud-card" style="display:flex;gap:12px;align-items:center">
        <strong>Predictions</strong>
        <div>A: <span id="oddsA">1.8x</span> | B: <span id="oddsB">2.1x</span></div>
        <input type="range" id="stake" min="10" max="1000" value="100">
        <button class="button">Place</button>
      </div>
      <div style="display:flex;gap:8px">
        <button class="iconbtn">Clip 15s</button>
        <button class="iconbtn">Share</button>
      </div>
    </div>
  </div>
  <div class="panel" style="grid-column:1/9">
    <strong>Highlights</strong>
    <div style="height:100px;background:#121620;border-radius:8px;margin-top:8px"></div>
  </div>
  <div class="panel" style="grid-column:9/-1">
    <strong>Stats</strong>
    <div style="display:flex;gap:12px;margin-top:8px">
      <div class="hud-card" style="flex:1"><div>Damage/min</div><div id="dpm">260</div></div>
      <div class="hud-card" style="flex:1"><div>Heat</div><div id="heatAvg">44</div></div>
    </div>
  </div>
</div>
<script>
(function(){
  const hpA=document.getElementById('hpA');
  const hpB=document.getElementById('hpB');
  const enA=document.getElementById('enA');
  const enB=document.getElementById('enB');
  const heatA=document.getElementById('heatA');
  const heatB=document.getElementById('heatB');
  const chargeA=document.getElementById('chargeA');
  const chargeB=document.getElementById('chargeB');
  let t=0; setInterval(()=>{
    t+=1;
    const hp1=Math.max(10,90-Math.floor(t%80));
    const hp2=Math.max(5,95-Math.floor((t*0.8)%90));
    hpA.style.width=hp1+'%'; hpB.style.width=hp2+'%';
    enA.textContent=String(60+Math.floor(20*Math.sin(t/10))).padStart(2,'0');
    enB.textContent=String(70+Math.floor(10*Math.cos(t/12))).padStart(2,'0');
    heatA.textContent=String(20+Math.floor(10*Math.sin(t/8)));
    heatB.textContent=String(15+Math.floor(8*Math.cos(t/7)));
    chargeA.textContent=(0.2+0.8*((t%50)/50)).toFixed(1);
    chargeB.textContent=(0.1+0.6*((t%40)/40)).toFixed(1);
  },250);
  ['camAuto','camTop','camOrbit'].forEach(id=>{
    const el=document.getElementById(id); if(!el) return; el.addEventListener('click',()=>{
      document.getElementById('canvas').style.background = id==='camTop' ? 'linear-gradient(#0E1014,#000)' : id==='camOrbit' ? 'radial-gradient(ellipse at center,#101420 0%,#0E1014 60%,#000 100%)' : 'radial-gradient(ellipse at center,#141821 0%,#0E1014 60%,#000 100%)';
    });
  });
})();
</script>
</body></html>
